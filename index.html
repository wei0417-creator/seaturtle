<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>望安守護者：海龜成長日記</title>
    <style>
        /* 全域樣式 */
        body { font-family: 'Microsoft JhengHei', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; background-color: #000; }
        
        /* 基礎背景圖 (首頁與第一站使用) */
        .base-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('wangan_bg.jpg'); background-size: cover; background-position: center; z-index: -2; transition: opacity 1s; }

        /* 第二站專用：風景輪播影片層 */
        #video-carousel-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; display: none; opacity: 0; transition: opacity 1.5s; }
        #carousel-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }

        .glass-card { width: 90%; max-width: 420px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border-radius: 30px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); text-align: center; z-index: 10; position: relative; }

        /* 首頁背景 (保育中心) */
        #landing-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('wangan_center.jpg'); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        
        .stele-img { width: 100%; border-radius: 15px; margin: 10px 0; border: 2px solid #b71c1c; }
        #main-game-container { display: none; }
        .video-container { width: 100%; border-radius: 20px; overflow: hidden; margin: 15px 0; background: #000; }
        button { background: linear-gradient(135deg, #00796b, #004d40); color: white; border: none; padding: 14px; border-radius: 15px; font-size: 17px; width: 100%; cursor: pointer; font-weight: bold; margin: 8px 0; transition: 0.3s; }
        .instruction-box { margin-top: 10px; padding: 10px; background: #fff9c4; border-radius: 10px; font-weight: bold; color: #f57f17; border: 1px dashed #f57f17; }

        #quiz-overlay, #reward-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; justify-content: center; align-items: center; }
        .modal-box { width: 85%; max-width: 400px; background: white; padding: 25px; border-radius: 25px; text-align: center; }
    </style>
</head>
<body>

<audio id="bg-music" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
<div class="base-bg" id="base-bg"></div>

<div id="video-carousel-bg">
    <video id="carousel-video" muted playsinline></video>
</div>

<div id="landing-overlay">
    <div class="glass-card">
        <h2 style="color: #004d40;">🌊 歡迎來到<br>望安綠蠵龜觀光保育中心</h2>
        <button onclick="enterApp()">開始守護之旅</button>
    </div>
</div>

<div id="main-game-container" class="glass-card">
    <h2 style="color: #004d40; margin: 0;">🐢 海龜守護日記</h2>

    <div id="adopt-ui">
        <div style="text-align: left; margin-bottom: 10px;">
            <h3 style="color: #b71c1c; margin: 5px 0;">🗿 第一站：鎮館之寶</h3>
            <img src="stele.webp" alt="好善堂石碑" class="stele-img">
            <p style="font-size: 14px; color: #444;">為認養的海龜蛋命名，延續保育精神：</p>
        </div>
        <input type="text" id="turtleName" placeholder="例如：小望" style="width:85%; padding:12px; border-radius:12px; border:1px solid #ccc;"><br><br>
        <button onclick="startAdoption()" style="background: #b71c1c;">📜 簽署守護誓約</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div class="video-container">
            <video id="main-video" width="100%" autoplay loop muted playsinline>
                <source id="video-src" src="videosegg_waiting.mp4" type="video/mp4">
            </video>
        </div>
        <h3 id="display-name" style="margin: 5px 0;"></h3>
        <p id="display-status">狀態：孵化中...</p>
        <div id="action-buttons">
            <button id="step2-btn" onclick="startStep2()">第二站：望安風景分享 (Exp+1)</button>
            <button id="quiz-btn" onclick="openQuiz()" style="background: linear-gradient(135deg, #ffa000, #ff6f00);">❓ 知識挑戰 (0/8)</button>
        </div>
        <div class="instruction-box" id="instruction-box">📍 契約已成！請帶小龜前往下一站。</div>
    </div>
</div>

<div id="quiz-overlay"><div class="modal-box" style="text-align: left;"><div id="quiz-progress">進度：0 / 8</div><h3 id="quiz-question"></h3><div id="quiz-options"></div><button onclick="closeQuiz()" style="background:#999; margin-top:10px;">暫時關閉</button></div></div>
<div id="reward-overlay"><div class="modal-box"><h2 style="color:#d32f2f;">🎁 守護者大抽獎</h2><div id="lottery-result">？？？</div><button id="draw-btn" onclick="startDraw()" style="background:#d32f2f;">開始抽獎</button><div id="redeem-hint" style="display:none; font-weight:bold; margin-top:10px;">請向服務台領獎！</div></div></div>

<script>
    const gasUrl = "https://script.google.com/macros/s/AKfycbxdkUYz9CPQ4Tg9J2q08BoRIYeonB_kJ1mxWoNhsWdgvIfnbTpF-M66yc4O4T0KzoByYg/exec"; 
    let myId = "";
    let currentLv = 0;
    let quizCount = 0;

    // 第二站背景輪播影片清單
    const landscapeVideos = ["sunrise.mp4", "nightview.mp4", "tiantaishan.mp4", "monsoon.mp4"];
    let currentVideoIdx = 0;

    function enterApp() {
        document.getElementById('landing-overlay').style.display = 'none';
        document.getElementById('main-game-container').style.display = 'block';
        const audio = document.getElementById('bg-music');
        if(audio) { audio.volume = 0.4; audio.play().catch(e => {}); }
    }

    function startAdoption() {
        const name = document.getElementById('turtleName').value || "守護者";
        myId = "T" + new Date().getTime();
        fetch(`${gasUrl}?action=adopt&id=${myId}&name=${encodeURIComponent(name)}&species=好善堂蛋窩`, { mode: 'no-cors' })
        .then(() => {
            document.getElementById('display-name').innerText = name + " 的成長日記";
            document.getElementById('adopt-ui').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            updateInstruction("第二站：望安風景分享區");
        });
    }

    // 第二站啟動：開始背景輪播
    function startStep2() {
        doTask('望安風景分享', 1);
        const videoLayer = document.getElementById('video-carousel-bg');
        const carouselVideo = document.getElementById('carousel-video');
        
        videoLayer.style.display = 'block';
        setTimeout(() => videoLayer.style.opacity = '1', 50);
        
        playNextLandscape();
        updateInstruction("第三站：白子尋奇區");
        document.getElementById('step2-btn').disabled = true;
        document.getElementById('step2-btn').innerText = "✅ 已瀏覽望安美景";
    }

    function playNextLandscape() {
        const v = document.getElementById('carousel-video');
        v.src = landscapeVideos[currentVideoIdx];
        v.play();
        v.onended = () => {
            currentVideoIdx = (currentVideoIdx + 1) % landscapeVideos.length;
            playNextLandscape();
        };
    }

    function updateInstruction(target) {
        document.getElementById('instruction-box').innerText = `📍 任務達成！請前往：${target}`;
    }

    function doTask(taskName, points) {
        if (!myId) return;
        currentLv += points;
        fetch(`${gasUrl}?action=update&id=${myId}&task=${encodeURIComponent(taskName)}`, { mode: 'no-cors' }).then(() => updateUI());
    }

    // 測驗與抽獎邏輯 (與先前一致)
    const quizData = [
        { q: "決定海龜性別的因素？", o: ["沙灘溫度", "海水鹽度", "蛋的大小"], c: 0 },
        { q: "小海龜破殼後靠什麼找大海？", o: ["海水氣味", "海面反光", "母龜呼喚"], c: 1 },
        { q: "綠蠵龜脂肪呈綠色是因為主食？", o: ["海藻海草", "水母", "小魚"], c: 0 },
        { q: "遺失漁具持續傷害海洋稱為？", o: ["幽靈漁具", "過度捕撈", "海洋廢棄物"], c: 0 },
        { q: "海龜媽媽通常何時產卵？", o: ["正午", "清晨", "深夜"], c: 2 },
        { q: "海龜成熟需多久？", o: ["3-5年", "10年", "20-50年"], c: 2 },
        { q: "海龜為何誤食塑膠袋？", o: ["像水母", "很香", "口感好"], c: 0 },
        { q: "望安最重要的產卵地？", o: ["網垵口沙灘", "隘門沙灘", "山水沙灘"], c: 0 }
    ];

    function openQuiz() {
        if(quizCount >= 8) { showReward(); return; }
        const q = quizData[quizCount];
        document.getElementById('quiz-progress').innerText = `進度：${quizCount + 1} / 8`;
        document.getElementById('quiz-question').innerText = q.q;
        const opts = document.getElementById('quiz-options');
        opts.innerHTML = "";
        q.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.innerText = opt; btn.style.background = "#e0f2f1"; btn.style.color = "#004d40";
            btn.onclick = () => {
                quizCount++;
                const correct = (idx === q.c);
                doTask(correct ? "知識挑戰成功" : "知識挑戰練習", correct ? 2 : 1);
                if(quizCount === 4) updateInstruction("第四站：洄游之謎區");
                if(quizCount === 8) updateInstruction("第五站：與海龜親密接觸區");
                updateQuizButton(); closeQuiz();
                if(quizCount >= 8) setTimeout(showReward, 500);
            };
            opts.appendChild(btn);
        });
        document.getElementById('quiz-overlay').style.display = 'flex';
    }

    function startDraw() {
        const res = document.getElementById('lottery-result');
        const btn = document.getElementById('draw-btn');
        btn.disabled = true; btn.innerText = "抽取中..."; res.classList.add('rolling');
        let count = 0;
        let timer = setInterval(() => {
            res.innerText = ["獎項A", "獎項B", "獎項C"][Math.floor(Math.random() * 3)];
            if (++count > 25) {
                clearInterval(timer); res.classList.remove('rolling');
                const prize = ["海龜棒棒糖", "飲料", "九折券"][Math.floor(Math.random() * 3)];
                res.innerText = "🎉 " + prize + " 🎉";
                btn.style.display = "none"; document.getElementById('redeem-hint').style.display = "block";
                fetch(`${gasUrl}?action=update&id=${myId}&task=${encodeURIComponent("抽中獎項:" + prize)}`, { mode: 'no-cors' });
            }
        }, 100);
    }

    function updateUI() {
        const video = document.getElementById('main-video');
        const source = document.getElementById('video-src');
        if (currentLv >= 2 && currentLv < 8 && !source.src.includes("videosegg_hatch.mp4.mp4")) {
            source.src = "videosegg_hatch.mp4.mp4"; document.getElementById('display-status').innerText = "狀態：幼龜破殼"; video.load(); video.play();
        } else if (currentLv >= 8 && !source.src.includes("videossea_swimming.mp4")) {
            source.src = "videossea_swimming.mp4"; document.getElementById('display-status').innerText = "狀態：游向大海"; video.load(); video.play();
        }
    }

    function closeQuiz() { document.getElementById('quiz-overlay').style.display = 'none'; }
    function showReward() { document.getElementById('reward-overlay').style.display = 'flex'; }
    function updateQuizButton() {
        const btn = document.getElementById('quiz-btn');
        if(quizCount >= 8) { btn.innerText = "🎁 領取獎項"; btn.style.background = "linear-gradient(135deg, #d32f2f, #b71c1c)"; }
        else { btn.innerText = `❓ 知識挑戰 (${quizCount}/8)`; }
    }
</script>

</body>
</html>
