<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>望安守護者：海龜成長日記</title>
    <style>
        /* 全域樣式維持靠左面板 */
        body { font-family: 'Microsoft JhengHei', sans-serif; margin: 0; display: flex; justify-content: flex-start; align-items: center; min-height: 100vh; overflow: hidden; background-color: #000; padding-left: 3%; }
        .base-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('wangan_bg.jpg'); background-size: cover; background-position: center; z-index: -2; }
        #video-carousel-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; display: none; opacity: 0; transition: opacity 1.5s; }
        #carousel-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }

        /* 左側玻璃控制面板 */
        .glass-card { width: 90%; max-width: 380px; background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(15px); border-radius: 30px; padding: 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.3); text-align: center; z-index: 10; max-height: 95vh; overflow-y: auto; }
        #landing-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('wangan_center.jpg'); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        
        /* 元件樣式 */
        .stele-img { width: 100%; border-radius: 15px; margin: 10px 0; border: 3px solid #b71c1c; }
        .video-container { width: 100%; border-radius: 15px; overflow: hidden; margin: 10px 0; background: #000; line-height: 0; }
        button { background: linear-gradient(135deg, #00796b, #004d40); color: white; border: none; padding: 12px; border-radius: 15px; font-size: 16px; width: 100%; cursor: pointer; font-weight: bold; margin: 8px 0; transition: 0.3s; }
        
        /* 答題回饋區樣式 */
        #quiz-feedback { display: none; margin-top: 15px; padding: 15px; border-radius: 15px; text-align: left; font-size: 14px; line-height: 1.5; }
        .feedback-correct { background: #e8f5e9; border-left: 5px solid #4caf50; color: #2e7d32; }
        .feedback-wrong { background: #ffebee; border-left: 5px solid #f44336; color: #c62828; }

        /* 彈窗樣式 */
        #quiz-overlay, #reward-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; justify-content: center; align-items: center; }
        .modal-box { width: 85%; max-width: 400px; background: white; padding: 25px; border-radius: 25px; text-align: center; }
        #lottery-result { font-size: 26px; font-weight: bold; color: #d32f2f; margin: 15px 0; }
        .rolling { animation: flash 0.1s infinite; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 懸浮回首頁按鈕樣式 */
        .home-float-btn {
            position: fixed; top: 20px; left: 20px; z-index: 9999;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4); width: 45px; height: 45px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .home-float-btn:hover { background: rgba(255, 255, 255, 0.4); transform: scale(1.1); }
        .home-icon { font-size: 22px; }
    </style>
</head>
<body>

<a href="https://wei0417-creator.github.io/portal/" class="home-float-btn" title="回導覽門戶">
    <span class="home-icon">🏠</span>
</a>

<audio id="bg-music" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
<div class="base-bg"></div>
<div id="video-carousel-bg"><video id="carousel-video" muted playsinline></video></div>

<div id="landing-overlay">
    <div class="glass-card" style="margin-left: 0; max-width: 420px;"> 
        <h2 style="color: #004d40;">🌊 歡迎來到<br>望安綠蠵龜觀光保育中心</h2>
        <p style="font-size: 14px; color: #555;">跟隨 APP 指引完成 5 站導覽與 8 題挑戰<br>即可領取守護者禮物！</p>
        <button onclick="enterApp()">開始守護之旅</button>
    </div>
</div>

<div id="main-game-container" class="glass-card" style="display:none;">
    <h2 style="color: #004d40; margin: 0; font-size: 20px;">🐢 海龜守護日記</h2>

    <div id="adopt-ui">
        <div style="text-align: left; margin-bottom: 10px;">
            <h3 style="color: #b71c1c; margin: 10px 0;">🗿 第一站：鎮館之寶</h3>
            <img src="stele.webp" alt="好善堂石碑" class="stele-img">
            <p style="font-size: 13px; color: #444;">為海龜蛋命名，延續好善堂保育精神：</p>
        </div>
        <input type="text" id="turtleName" placeholder="例如：小望" style="width:88%; padding:12px; border-radius:10px; border:1px solid #ccc;"><br><br>
        <button onclick="startAdoption()" style="background: #b71c1c;">📜 簽署守護誓約</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div class="video-container"><video id="main-video" width="100%" autoplay loop muted playsinline><source id="video-src" src="videos/videosegg_waiting.mp4"></video></div>
        <h3 id="display-name" style="margin: 5px 0;"></h3>
        <p id="display-status">狀態：孵化中...</p>
        <div id="action-buttons">
            <button id="step2-btn" onclick="startStep2()">第二站：望安風景分享 (Exp+1)</button>
            <button id="quiz-btn" onclick="openQuiz()" style="background: linear-gradient(135deg, #ffa000, #ff6f00);">❓ 知識挑戰 (進度 0/8)</button>
        </div>
        <div class="instruction-box" id="instruction-box" style="margin-top:10px; padding:10px; background:#fff9c4; border-radius:10px; font-weight:bold; color:#f57f17; border:1px dashed #f57f17;">📍 誓約已成！請前往下一站。</div>
    </div>
</div>

<div id="quiz-overlay">
    <div class="modal-box">
        <div id="quiz-progress" style="color:#00796b; font-weight:bold; margin-bottom:10px;">挑戰進度：0 / 8</div>
        <h3 id="quiz-question" style="color: #333; font-size: 18px;"></h3>
        <div id="quiz-options"></div>
        <div id="quiz-feedback">
            <b id="feedback-title"></b><br>
            <span id="feedback-reason"></span>
            <button id="next-quiz-btn" onclick="finishCurrentQuiz()" style="margin-top:15px; background:#00796b;">了解了，繼續導覽</button>
        </div>
        <button id="close-quiz-btn" onclick="closeQuiz()" style="background:#999; margin-top:10px;">暫時關閉</button>
    </div>
</div>

<div id="reward-overlay"><div class="modal-box"><h2 style="color:#d32f2f;">🎁 守護者大抽獎</h2><div id="lottery-result">？？？</div><button id="draw-btn" onclick="startDraw()" style="background:#d32f2f;">開始抽獎</button><div id="redeem-hint" style="display:none; font-weight:bold; margin-top:10px; color:#d32f2f;">請向服務台領獎！</div></div></div>

<script>
    const gasUrl = "https://script.google.com/macros/s/AKfycbxdkUYz9CPQ4Tg9J2q08BoRIYeonB_kJ1mxWoNhsWdgvIfnbTpF-M66yc4O4T0KzoByYg/exec"; 
    let myId = ""; let currentLv = 0; let quizCount = 0;
    const landscapeVideos = ["sunrise.mp4", "nightview.mp4", "tiantaishan.mp4", "monsoon.mp4"];
    let currentVideoIdx = 0;

    const quizData = [
        { q: "決定海龜性別的因素？", o: ["沙灘溫度", "海水鹽度", "蛋的大小"], c: 0, r: "💡 較溫暖的沙窩會孵出雌性，較涼爽則孵出雄性喔！" },
        { q: "小海龜破殼後靠什麼找大海？", o: ["海水氣味", "海面反光", "母龜呼喚"], c: 1, r: "💡 小海龜有趨光性，會朝向最明亮的海面反光處前進。" },
        { q: "綠蠵龜脂肪呈綠色是因為主食？", o: ["海藻海草", "水母", "小魚"], c: 0, r: "💡 植物色素堆積在脂肪中才變成綠色。" },
        { q: "被遺棄漁網持續傷害海洋稱為？", o: ["幽靈漁具", "過度捕撈", "海洋廢物"], c: 0, r: "💡 這些遺失漁具像幽靈一樣在海中飄盪持續傷生物。" },
        { q: "海龜媽媽通常何時產卵？", o: ["正午", "清晨", "深夜"], c: 2, r: "💡 深夜產卵最安全，能避開天敵也較涼爽。" },
        { q: "海龜成熟需多久？", o: ["3-5年", "10年", "20-50年"], c: 2, r: "💡 海龜成長極緩慢，通常需20年以上才能成年。" },
        { q: "海龜為何誤食塑膠袋？", o: ["像水母", "很香", "口感好"], c: 0, r: "💡 透明塑膠袋在水中飄動的樣子，與海龜最愛吃的水母非常相似。" },
        { q: "望安最重要的產卵地？", o: ["網垵口沙灘", "隘門沙灘", "山水沙灘"], c: 0, r: "💡 網垵口沙灘是全台灣最重要的綠蠵龜產卵保護區。" }
    ];

    function enterApp() {
        document.getElementById('landing-overlay').style.display = 'none';
        document.getElementById('main-game-container').style.display = 'block';
        const audio = document.getElementById('bg-music'); if(audio) { audio.volume = 0.4; audio.play().catch(e=>{}); }
    }

    function startAdoption() {
        const name = document.getElementById('turtleName').value || "守護者";
        myId = "T" + new Date().getTime();
        fetch(`${gasUrl}?action=adopt&id=${myId}&name=${encodeURIComponent(name)}&species=好善堂蛋窩`, { mode: 'no-cors' })
        .then(() => {
            document.getElementById('display-name').innerText = name + " 的日記";
            document.getElementById('adopt-ui').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            updateInstruction("第二站：望安風景分享區");
        });
    }

    function startStep2() {
        doTask('望安風景分享', 1);
        document.getElementById('video-carousel-bg').style.display = 'block';
        setTimeout(() => document.getElementById('video-carousel-bg').style.opacity = '1', 50);
        playNextLandscape();
        updateInstruction("第三站：白子尋奇區 (請點擊知識挑戰)");
        document.getElementById('step2-btn').disabled = true;
        document.getElementById('step2-btn').innerText = "✅ 已瀏覽望安美景";
    }

    function playNextLandscape() {
        const v = document.getElementById('carousel-video'); v.src = landscapeVideos[currentVideoIdx]; v.play();
        v.onended = () => { currentVideoIdx = (currentVideoIdx + 1) % landscapeVideos.length; playNextLandscape(); };
    }

    function openQuiz() {
        if(quizCount >= 8) { showReward(); return; }
        const q = quizData[quizCount];
        document.getElementById('quiz-progress').innerText = `挑戰進度：${quizCount + 1} / 8`;
        document.getElementById('quiz-question').innerText = q.q;
        document.getElementById('quiz-question').style.display = 'block';
        document.getElementById('quiz-options').style.display = 'block';
        document.getElementById('quiz-feedback').style.display = 'none';
        document.getElementById('close-quiz-btn').style.display = 'block';
        const opts = document.getElementById('quiz-options');
        opts.innerHTML = "";
        q.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.innerText = opt; btn.style.background = "#e0f2f1"; btn.style.color = "#004d40";
            btn.onclick = () => handleAnswer(idx);
            opts.appendChild(btn);
        });
        document.getElementById('quiz-overlay').style.display = 'flex';
    }

    function handleAnswer(idx) {
        const q = quizData[quizCount];
        const correct = (idx === q.c);
        document.getElementById('quiz-options').style.display = 'none';
        document.getElementById('quiz-question').style.display = 'none';
        document.getElementById('close-quiz-btn').style.display = 'none';
        document.getElementById('feedback-title').innerText = correct ? "✅ 答對了！" : "❌ 答錯了，長知識時間：";
        document.getElementById('feedback-reason').innerText = q.r;
        document.getElementById('quiz-feedback').className = correct ? "feedback-correct" : "feedback-wrong";
        document.getElementById('quiz-feedback').style.display = "block";
        doTask(correct ? "知識挑戰成功" : "知識挑戰練習", correct ? 2 : 1);
    }

    function finishCurrentQuiz() {
        quizCount++;
        if(quizCount === 2) updateInstruction("第四站：洄游之謎區");
        if(quizCount === 6) updateInstruction("第五站：與海龜親密接觸區");
        updateQuizButton();
        closeQuiz();
        if(quizCount >= 8) setTimeout(showReward, 500);
    }

    function updateQuizButton() {
        const btn = document.getElementById('quiz-btn');
        if(quizCount >= 8) {
            btn.innerText = "🎁 領取守護者獎項";
            btn.style.background = "linear-gradient(135deg, #d32f2f, #b71c1c)";
        } else {
            btn.innerText = `❓ 知識挑戰 (進度 ${quizCount}/8)`;
        }
    }

    function startDraw() {
        const res = document.getElementById('lottery-result');
        const btn = document.getElementById('draw-btn');
        btn.disabled = true; btn.innerText = "抽取中..."; res.classList.add('rolling');
        let count = 0;
        let timer = setInterval(() => {
            res.innerText = ["棒棒糖", "九折券", "海龜黑咖啡"][Math.floor(Math.random() * 3)];
            if (++count > 25) {
                clearInterval(timer); res.classList.remove('rolling');
                const prize = ["海龜棒棒糖", "九折券", "飲料一罐(限35元)", "海龜黑咖啡一杯", "50元折抵券(消費金額須達300元)"][Math.floor(Math.random() * 5)];
                res.innerText = "🎉 " + prize + " 🎉";
                btn.style.display = "none"; document.getElementById('redeem-hint').style.display = "block";
                fetch(`${gasUrl}?action=update&id=${myId}&task=${encodeURIComponent("抽中獎項:" + prize)}`, { mode: 'no-cors' })
                .then(() => setTimeout(() => { document.getElementById('reward-overlay').style.display = 'none'; showFinalEnding(); }, 4500));
            }
        }, 100);
    }

    function updateInstruction(target) { document.getElementById('instruction-box').innerText = `📍 任務達成！請前往：${target}`; }
    function doTask(taskName, points) { if (!myId) return; currentLv += points; fetch(`${gasUrl}?action=update&id=${myId}&task=${encodeURIComponent(taskName)}`, { mode: 'no-cors' }).then(() => updateUI()); }
    function closeQuiz() { document.getElementById('quiz-overlay').style.display = 'none'; }
    function showReward() { document.getElementById('reward-overlay').style.display = 'flex'; }
    
    function updateUI() {
        const video = document.getElementById('main-video'); const source = document.getElementById('video-src');
        if (currentLv >= 2 && currentLv < 8 && !source.src.includes("hatch")) { 
            source.src = "videos/videosegg_hatch.mp4.mp4"; document.getElementById('display-status').innerText = "狀態：幼龜破殼"; video.load(); video.play(); 
        } else if (currentLv >= 8 && !source.src.includes("swimming")) { 
            source.src = "videos/videossea_swimming.mp4"; document.getElementById('display-status').innerText = "狀態：游向大海"; video.load(); video.play(); 
        }
    }
    function showFinalEnding() {
        document.getElementById('display-status').innerText = "狀態：任務達成";
        document.getElementById('game-ui').innerHTML = "<div style='background:rgba(255,255,255,0.7); padding:15px; border-radius:20px;'><h3>🌊 守護任務達成！</h3><p>謝謝你幫助小龜回到大海。請記得向服務台領獎！</p></div>";
        document.getElementById('instruction-box').style.display = "none";
    }
</script>

</body>
</html>
