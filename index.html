<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>望安守護者：海龜成長日記</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-image: url('wangan_bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .glass-card {
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            position: relative;
        }

        .video-container {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            margin: 15px 0;
            background: #000;
            line-height: 0;
        }

        button {
            background: linear-gradient(135deg, #00796b, #004d40);
            color: white; border: none; padding: 12px 20px; border-radius: 15px;
            font-size: 16px; margin: 8px 0; width: 100%; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s;
        }

        button:active { transform: scale(0.95); }

        .diary-entry {
            background: rgba(224, 242, 241, 0.6);
            padding: 15px; border-radius: 15px; text-align: left;
            font-size: 14px; margin-top: 15px; border-left: 5px solid #00796b;
        }

        #quiz-overlay, #reward-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000;
            justify-content: center; align-items: center;
        }

        .modal-box {
            width: 85%; max-width: 400px; background: white;
            padding: 25px; border-radius: 25px; text-align: center;
        }

        #lottery-result {
            font-size: 24px; font-weight: bold; color: #d32f2f;
            margin: 20px 0; min-height: 40px;
        }
        .rolling { animation: flash 0.1s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        #game-ui { display: none; }
    </style>
</head>
<body>

<audio id="bg-music" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

<div class="glass-card">
    <h2 style="color: #004d40; margin-top: 0;">🐢 海龜守護日記</h2>

    <div id="adopt-ui">
        <p>給即將出世的小龜取個名字：</p>
        <input type="text" id="turtleName" placeholder="海龜的名字" style="width:80%; padding:10px; border-radius:10px; border:1px solid #ccc;"><br><br>
        <button onclick="startAdoption()">守護這顆海龜蛋</button>
    </div>

    <div id="game-ui">
        <div class="video-container">
            <video id="main-video" width="100%" autoplay loop muted playsinline>
                <source id="video-src" src="videosegg_waiting.mp4" type="video/mp4">
            </video>
        </div>
        <h3 id="display-name" style="margin: 5px 0;"></h3>
        <p id="display-status">狀態：孵化中...</p>

        <div id="action-buttons">
            <button onclick="doTask('巡視沙灘', 1)">🔦 完成沙灘巡視 (Exp+1)</button>
            <button id="quiz-btn" onclick="openQuiz()" style="background: linear-gradient(135deg, #ffa000, #ff6f00);">❓ 知識挑戰 (0/8)</button>
        </div>

        <div class="diary-entry">
            <strong>📖 守護日誌</strong><br>
            <span id="diary-text">今天在望安巡視，希望小龜能平安出生。</span>
        </div>
    </div>
</div>

<div id="quiz-overlay">
    <div class="modal-box" style="text-align: left;">
        <div id="quiz-progress" style="color:#00796b; font-weight:bold;">進度：0 / 8</div>
        <h3 id="quiz-question" style="color: #00796b;">題目載入中...</h3>
        <div id="quiz-options"></div>
        <button onclick="closeQuiz()" style="background: #999; margin-top: 15px;">暫時關閉</button>
    </div>
</div>

<div id="reward-overlay">
    <div class="modal-box">
        <h2 style="color: #d32f2f;">🎁 守護者大抽獎</h2>
        <p>恭喜完成 8 題挑戰！<br>現在請按下按鈕抽取你的禮物：</p>
        <div id="lottery-result">？？？</div>
        <button id="draw-btn" onclick="startDraw()" style="background: #d32f2f;">開始抽獎</button>
        <div id="redeem-hint" style="display:none;">
            <p style="font-size: 14px; color: #555; margin-top: 10px;">
                請將此畫面出示給服務台人員兌換<br>
                <span style="color:#d32f2f; font-weight:bold;">(每個帳號限領一次)</span>
            </p>
            <p style="font-size: 12px; color: #999;">正在儲存結果，請稍候...</p>
        </div>
    </div>
</div>

<script>
    const gasUrl = "https://script.google.com/macros/s/AKfycbxdkUYz9CPQ4Tg9J2q08BoRIYeonB_kJ1mxWoNhsWdgvIfnbTpF-M66yc4O4T0KzoByYg/exec"; 
    let myId = "";
    let currentLv = 0;
    let quizCount = 0;

    const prizes = [
        "折價卷九折劵乙張",
        "海龜棒棒糖一隻",
        "飲料一罐",
        "冰塊杯一杯",
        "環保飲料杯一只",
        "現金50元折抵劵(滿300元)"
    ];

    const quizData = [
        { q: "望安沙灘上，決定海龜性別的因素？", o: ["沙灘的溫度", "海水鹽度", "蛋的大小"], c: 0, r: "較溫暖的沙窩通常會孵出雌性！" },
        { q: "小海龜破殼後靠什麼尋找大海？", o: ["海水氣味", "海面反光", "母龜呼喚"], c: 1, r: "小龜有趨光性，會朝向亮光處。" },
        { q: "綠蠵龜之所以叫「綠」是因為？", o: ["背甲顏色", "脂肪顏色", "皮膚顏色"], c: 1, r: "主食海藻海草使其脂肪呈現綠色。" },
        { q: "被廢棄漁網纏繞屬於哪種海洋威脅？", o: ["幽靈漁具", "過度捕撈", "優養化"], c: 0, r: "遺失漁具會持續在海中造成傷害。" },
        { q: "海龜媽媽通常在什麼時候上岸產卵？", o: ["正午時分", "清晨", "深夜"], c: 2, r: "深夜環境隱蔽且涼爽最安全。" },
        { q: "海龜成熟回到家鄉產卵約需幾年？", o: ["3-5年", "10年", "20-50年"], c: 2, r: "海龜成長緩慢需要數十年才能成年。" },
        { q: "海龜誤食塑膠袋的主因？", o: ["看起來像水母", "聞起來很香", "口感很好"], c: 0, r: "漂浮袋子視覺上與水母非常相似。" },
        { q: "望安最重要的海龜產卵地？", o: ["網垵口沙灘", "隘門沙灘", "山水沙灘"], c: 0, r: "網垵口是核心的保育沙灘。" }
    ];

    function startAdoption() {
        const audio = document.getElementById('bg-music');
        if(audio) { audio.volume = 0.5; audio.play().catch(e => {}); }
        const name = document.getElementById('turtleName').value;
        if(!name) return alert("請輸入名字");
        myId = "T" + new Date().getTime();
        fetch(`${gasUrl}?action=adopt&name=${encodeURIComponent(name)}&species=海龜蛋`, { mode: 'no-cors' })
        .then(() => {
            document.getElementById('display-name').innerText = name + " 的日記";
            document.getElementById('adopt-ui').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('main-video').play();
        });
    }

    function openQuiz() {
        if(quizCount >= 8) { showReward(); return; }
        const q = quizData[quizCount];
        document.getElementById('quiz-progress').innerText = `進度：${quizCount + 1} / 8`;
        document.getElementById('quiz-question').innerText = q.q;
        const optionsDiv = document.getElementById('quiz-options');
        optionsDiv.innerHTML = "";
        
        q.o.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.style.background = "#e0f2f1"; btn.style.color = "#004d40";
            btn.onclick = () => {
                quizCount++;
                if(index === q.c) { alert("答對了！Exp+2\n" + q.r); doTask("知識挑戰成功", 2); }
                else { alert("答錯了，但學習也是守護！\n正確小知識：" + q.r); doTask("知識挑戰練習", 1); }
                updateQuizButton(); closeQuiz();
                if(quizCount >= 8) setTimeout(showReward, 500);
            };
            optionsDiv.appendChild(btn);
        });
        document.getElementById('quiz-overlay').style.display = 'flex';
    }

    function updateQuizButton() {
        const btn = document.getElementById('quiz-btn');
        if(quizCount >= 8) {
            btn.innerText = "🎁 領取守護者獎勵";
            btn.style.background = "linear-gradient(135deg, #d32f2f, #b71c1c)";
        } else {
            btn.innerText = `❓ 知識挑戰 (進度 ${quizCount}/8)`;
        }
    }

    function startDraw() {
        const resultDiv = document.getElementById('lottery-result');
        const drawBtn = document.getElementById('draw-btn');
        drawBtn.disabled = true;
        drawBtn.innerText = "抽取中...";
        resultDiv.classList.add('rolling');

        let count = 0;
        let timer = setInterval(() => {
            resultDiv.innerText = prizes[Math.floor(Math.random() * prizes.length)];
            count++;
            if (count > 25) {
                clearInterval(timer);
                resultDiv.classList.remove('rolling');
                const finalPrize = prizes[Math.floor(Math.random() * prizes.length)];
                resultDiv.innerText = "🎉 " + finalPrize + " 🎉";
                drawBtn.style.display = "none";
                document.getElementById('redeem-hint').style.display = "block";
                
                // 獎項同步回傳試算表 (這會觸發 GAS 寫入備註欄)
                doTask("抽中獎項: " + finalPrize, 0);

                // 3.5秒後自動跳轉到最後結語畫面
                setTimeout(() => {
                    document.getElementById('reward-overlay').style.display = 'none';
                    showFinalEnding();
                }, 3500);
            }
        }, 100);
    }

    function showFinalEnding() {
        const diary = document.getElementById('diary-text');
        const status = document.getElementById('display-status');
        const btnArea = document.getElementById('action-buttons');
        
        status.innerText = "狀態：守護任務達成";
        diary.innerHTML = "<strong>恭喜你完成守護之旅！</strong><br>這隻小龜因為你的守護，已經帶著你的祝福回到大海。請記得向服務台出示抽獎結果領取獎勵喔！";
        
        // 隱藏任務按鈕，顯示感謝訊息
        btnArea.innerHTML = "<h3 style='color:#00796b;'>🌊 守護者，我們大海見！</h3>";
    }

    function closeQuiz() { document.getElementById('quiz-overlay').style.display = 'none'; }
    function showReward() { document.getElementById('reward-overlay').style.display = 'flex'; }

    function doTask(taskName, points) {
        currentLv += points;
        fetch(`${gasUrl}?action=update&id=${myId}&task=${encodeURIComponent(taskName)}`, { mode: 'no-cors' });
        updateUI();
    }

    function updateUI() {
        const video = document.getElementById('main-video');
        const source = document.getElementById('video-src');
        const status = document.getElementById('display-status');
        const diary = document.getElementById('diary-text');

        if (currentLv >= 2 && currentLv < 8) {
            if(!source.src.includes("videosegg_hatch.mp4.mp4")) {
                source.src = "videosegg_hatch_mp4.mp4";
                status.innerText = "狀態：剛破殼的幼龜";
                diary.innerText = "太棒了！小龜順利破殼，正努力游向大海！";
                video.load(); video.play();
            }
        } else if (currentLv >= 8) {
            if(!source.src.includes("videossea_swimming.mp4")) {
                source.src = "sea_swimming.mp4";
                status.innerText = "狀態：在海洋中茁壯";
                diary.innerText = "小龜已在大海成長。完成 8 題即可抽獎領取獎勵！";
                video.load(); video.play();
            }
        }
    }
</script>

</body>
</html>
